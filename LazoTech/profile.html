<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LazoTech - Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="profile-header">
    <h1>Perfil</h1>
  </div>

  <div class="profile-card">
    <div class="avatar big-avatar" id="profileInitial">U</div>
    <div>
      <h2 id="myName">Usuario</h2>
      <p id="myEmail">correo@ejemplo.com</p>
    </div>
  </div>

  <div class="profile-card">
    <h3>Conectado con:</h3>
    <p id="profilePartnerName">Sin pareja vinculada</p>
  </div>

  <div class="settings-card">
    <h3>Configuración de ubicación</h3>
    <div class="setting-row">
      <span>Compartir ubicación</span>
      <input type="checkbox" checked>
    </div>
    <div class="setting-row">
      <span>Actualización automática</span>
      <input type="checkbox">
    </div>
  </div>

  <div class="bottom-menu">
  <button id="mapBtn">Mapa</button>
<button id="historyBtn">Historial</button>
<button id="profileBottomBtn">Perfil</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
