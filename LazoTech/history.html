<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazoTech - Historial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="history-page">
    <h1>Historial de lugares</h1>

    <div class="card">
      <label for="placeName">Nombre del lugar</label>
      <input id="placeName" type="text" placeholder="Ej. casa, escuela, trabajo">
      <button id="savePlaceBtn" type="button">Guardar lugar actual</button>
    </div>

    <div class="card">
      <h3>Lugares guardados</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="bottom-menu">
    <button id="mapBtn" type="button">Mapa</button>
    <button id="historyBtn" type="button">Historial</button>
    <button id="profileBottomBtn" type="button">Perfil</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
