<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazoTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo-box">❤</div>
    <h1 class="brand">LAZOTECH</h1>
    <p class="subtitle">Siempre conectados, siempre seguros</p>

    <div class="card">
      <label for="name">Tu nombre</label>
      <input id="name" type="text" placeholder="Ingresa tu nombre">

      <label for="email">Correo</label>
      <input id="email" type="email" placeholder="Ingresa tu correo">

      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="Ingresa tu contraseña">

      <button id="registerBtn" type="button">Registrarse</button>
<button id="loginBtn" type="button" class="secondary-btn">Iniciar sesión</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
